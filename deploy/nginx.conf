# ══════════════════════════════════════════════════════════════
#  Nginx — 37 Sushi (duas unidades no mesmo VPS)
#  Copie para: /etc/nginx/sites-available/37sushi
#  Ative:      ln -s /etc/nginx/sites-available/37sushi /etc/nginx/sites-enabled/
#  SSL:        certbot --nginx -d paranavaí.37sushi.com.br -d cianorte.37sushi.com.br
# ══════════════════════════════════════════════════════════════

# ── Paranavaí ─────────────────────────────────────────────────
server {
    listen 80;
    server_name paranavaí.37sushi.com.br;

    # Certbot preencherá aqui automaticamente (redirect HTTPS)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name paranavaí.37sushi.com.br;

    # Certbot preenche os caminhos dos certificados:
    # ssl_certificate     /etc/letsencrypt/live/paranavaí.37sushi.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/paranavaí.37sushi.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy para o backend Node.js (porta 3001)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
    }

    # Frontend React (build estático)
    location / {
        root  /opt/37sushi/paranavaí/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache agressivo para assets com hash no nome
        location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ── Cianorte ──────────────────────────────────────────────────
server {
    listen 80;
    server_name cianorte.37sushi.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cianorte.37sushi.com.br;

    # ssl_certificate     /etc/letsencrypt/live/cianorte.37sushi.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cianorte.37sushi.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
    }

    location / {
        root  /opt/37sushi/cianorte/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
