# ══════════════════════════════════════════════════════════════
#  Nginx — 37 Sushi (duas unidades no mesmo VPS)
#  Copie para: /etc/nginx/sites-available/37sushi
#  Ative:      ln -s /etc/nginx/sites-available/37sushi /etc/nginx/sites-enabled/
#  SSL:        certbot --nginx -d paranavaí.37sushi.com.br -d cianorte.37sushi.com.br
# ══════════════════════════════════════════════════════════════

# ── Paranavaí (subdomínio: pvai.37sushi.com.br) ───────────────
# Nota: diretório no servidor usa symlink /opt/37sushi/pvai → /opt/37sushi/paranavaí
server {
    listen 80;
    server_name pvai.37sushi.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pvai.37sushi.com.br;

    ssl_certificate     /etc/letsencrypt/live/pvai.37sushi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pvai.37sushi.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 15m;

    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
    }

    location /cardapio/ {
        alias /opt/37sushi/pvai/app/frontend/public/cardapio/;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /banners/ {
        alias /opt/37sushi/pvai/app/frontend/public/banners/;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        root  /opt/37sushi/pvai/app/frontend/dist;
        index index.html;
        try_files $uri /index.html;

        location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ── Cianorte ──────────────────────────────────────────────────
server {
    listen 80;
    server_name cianorte.37sushi.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cianorte.37sushi.com.br;

    # ssl_certificate     /etc/letsencrypt/live/cianorte.37sushi.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cianorte.37sushi.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 15m;

    location /api/ {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
    }

    location /cardapio/ {
        alias /opt/37sushi/cianorte/frontend/public/cardapio/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /banners/ {
        alias /opt/37sushi/cianorte/frontend/public/banners/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        root  /opt/37sushi/cianorte/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
