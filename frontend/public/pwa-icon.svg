<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="bandGrad" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <circle cx="256" cy="256" r="230"/>
    </clipPath>
  </defs>

  <!-- Fundo -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#f97316" stroke-width="6" opacity="0.4"/>

  <g clip-path="url(#clip)">
    <!-- Cabeça -->
    <ellipse cx="256" cy="230" rx="150" ry="162" fill="#1e1e1e"/>
    <ellipse cx="256" cy="128" rx="128" ry="82" fill="#111"/>

    <!-- Hachimaki / faixa laranja -->
    <rect x="104" y="178" width="304" height="64" rx="10" fill="url(#bandGrad)"/>

    <!-- Nó da faixa -->
    <ellipse cx="420" cy="210" rx="52" ry="35" fill="#ea580c"/>
    <ellipse cx="420" cy="210" rx="34" ry="21" fill="#f97316"/>
    <path d="M444 198 Q490 164 476 220 Q500 256 444 244Z" fill="#c2410c" opacity="0.8"/>

    <!-- Máscara -->
    <rect x="104" y="242" width="304" height="188" rx="22" fill="#161616"/>
    <!-- Vincos -->
    <line x1="136" y1="278" x2="372" y2="278" stroke="#2a2a2a" stroke-width="8"/>
    <line x1="136" y1="314" x2="372" y2="314" stroke="#2a2a2a" stroke-width="8"/>
    <line x1="136" y1="350" x2="372" y2="350" stroke="#2a2a2a" stroke-width="8"/>

    <!-- Glow olhos -->
    <ellipse cx="186" cy="262" rx="46" ry="24" fill="url(#eyeGlow)"/>
    <ellipse cx="326" cy="262" rx="46" ry="24" fill="url(#eyeGlow)"/>

    <!-- Olhos -->
    <path d="M146 262 Q186 228 226 262 Q186 284 146 262Z" fill="url(#eyeGrad)" filter="url(#glow)"/>
    <path d="M286 262 Q326 228 366 262 Q326 284 286 262Z" fill="url(#eyeGrad)" filter="url(#glow)"/>

    <!-- Pupila -->
    <ellipse cx="186" cy="262" rx="20" ry="16" fill="#7c2d12"/>
    <ellipse cx="326" cy="262" rx="20" ry="16" fill="#7c2d12"/>

    <!-- Brilho -->
    <circle cx="172" cy="250" r="8" fill="white" opacity="0.55"/>
    <circle cx="312" cy="250" r="8" fill="white" opacity="0.55"/>
  </g>
</svg>
